<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>💪 Workout Program</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  :root{
    --bg:#0f0f0f;--surface:#1a1a1a;--card:#242424;--border:#333;
    --accent:#f97316;--accent2:#fb923c;--text:#f1f1f1;--muted:#888;
    --back:#3b82f6;--chest:#ef4444;--core:#10b981;--legs:#a855f7;
    --radius:14px;--shadow:0 4px 20px rgba(0,0,0,.5)
  }
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow-x:hidden}
  /* HEADER */
  .header{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(15,15,15,.95);backdrop-filter:blur(12px);padding:env(safe-area-inset-top,0) 0 0;border-bottom:1px solid var(--border)}
  .header-inner{padding:14px 16px 0;display:flex;align-items:center;justify-content:space-between}
  .header h1{font-size:20px;font-weight:700;background:linear-gradient(135deg,var(--accent),#facc15);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .tabs{display:flex;gap:4px;padding:10px 16px 0}
  .tab{flex:1;padding:10px 6px;text-align:center;font-size:13px;font-weight:600;border-radius:10px 10px 0 0;cursor:pointer;transition:.2s;color:var(--muted);border:none;background:transparent}
  .tab.active{color:var(--accent);border-bottom:2px solid var(--accent)}
  /* MAIN */
  .main{padding-top:110px;padding-bottom:calc(env(safe-area-inset-bottom,0px) + 20px);min-height:100vh}
  .pane{display:none;padding:0 0 40px}
  .pane.active{display:block}
  /* WEEK SELECTOR */
  .week-bar{padding:14px 16px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:109px;z-index:50}
  .week-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
  .week-scroll::-webkit-scrollbar{display:none}
  .wk{min-width:52px;padding:6px 10px;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;text-align:center;white-space:nowrap;transition:.2s}
  .wk.active{background:var(--accent);border-color:var(--accent);color:#000}
  .phase-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;margin-left:8px;vertical-align:middle}
  /* DAY CARDS */
  .days-grid{padding:14px 16px;display:flex;flex-direction:column;gap:12px}
  .day-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden}
  .day-header{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
  .day-label{display:flex;align-items:center;gap:10px}
  .day-dot{width:10px;height:10px;border-radius:50%}
  .day-title{font-size:16px;font-weight:700}
  .day-sub{font-size:12px;color:var(--muted);margin-top:2px}
  .day-chevron{font-size:18px;color:var(--muted);transition:.3s}
  .day-card.open .day-chevron{transform:rotate(180deg)}
  .day-exercises{display:none;border-top:1px solid var(--border)}
  .day-card.open .day-exercises{display:block}
  /* EXERCISE ITEM IN PLAN */
  .ex-item{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;cursor:pointer;transition:.15s;active:background:var(--card)}
  .ex-item:last-child{border-bottom:none}
  .ex-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
  .ex-info{flex:1;min-width:0}
  .ex-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ex-meta{font-size:12px;color:var(--muted);margin-top:2px}
  .ex-play{width:36px;height:36px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px}
  /* MODAL */
  .modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.92);display:none;flex-direction:column;overflow-y:auto;padding-bottom:env(safe-area-inset-bottom,20px)}
  .modal-overlay.open{display:flex}
  .modal-close{position:sticky;top:0;z-index:10;padding:env(safe-area-inset-top,16px) 16px 12px;display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,.8);backdrop-filter:blur(10px)}
  .modal-close h2{font-size:18px;font-weight:700;flex:1;margin-right:10px}
  .close-btn{width:36px;height:36px;border-radius:50%;background:var(--card);border:none;color:var(--text);font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
  .modal-video{width:100%;background:#000;position:relative;min-height:300px}
  .modal-video video{width:100%;max-height:55vh;object-fit:contain;display:block}
  .modal-body{padding:20px 16px}
  .modal-tags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .tag{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;border:1.5px solid}
  .modal-section-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
  .cue-list{list-style:none;display:flex;flex-direction:column;gap:6px}
  .cue-list li{font-size:14px;line-height:1.5;padding-left:18px;position:relative;color:#d4d4d4}
  .cue-list li::before{content:"›";position:absolute;left:0;color:var(--accent);font-weight:700}
  /* LIBRARY */
  .lib-search{padding:14px 16px;position:sticky;top:109px;z-index:50;background:rgba(15,15,15,.95);backdrop-filter:blur(10px);border-bottom:1px solid var(--border)}
  .search-input{width:100%;padding:10px 16px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface);color:var(--text);font-size:15px;outline:none}
  .search-input:focus{border-color:var(--accent)}
  .cat-tabs{display:flex;gap:8px;overflow-x:auto;padding:10px 16px 0;scrollbar-width:none;border-bottom:1px solid var(--border);background:rgba(15,15,15,.95);backdrop-filter:blur(10px);position:sticky;top:162px;z-index:49}
  .cat-tabs::-webkit-scrollbar{display:none}
  .cat-tab{padding:8px 14px;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:.2s;margin-bottom:10px}
  .cat-tab.active{color:#000;border-color:transparent}
  .cat-tab[data-cat="all"].active{background:var(--accent)}
  .cat-tab[data-cat="back"].active{background:var(--back)}
  .cat-tab[data-cat="chest"].active{background:var(--chest)}
  .cat-tab[data-cat="core"].active{background:var(--core)}
  .cat-tab[data-cat="legs"].active{background:var(--legs)}
  .lib-section{padding:14px 16px}
  .lib-cat-header{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;padding:10px 0 8px;display:flex;align-items:center;gap:8px}
  .lib-cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .lib-grid{display:flex;flex-direction:column;gap:8px}
  .lib-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:14px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:.15s}
  .lib-card:active{background:var(--card)}
  .lib-thumb{width:64px;height:48px;border-radius:8px;overflow:hidden;flex-shrink:0;background:#111;position:relative}
  .lib-thumb video{width:100%;height:100%;object-fit:cover}
  .lib-play-icon{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.4);font-size:20px}
  .lib-info{flex:1;min-width:0}
  .lib-name{font-size:14px;font-weight:600}
  .lib-meta{font-size:12px;color:var(--muted);margin-top:3px}
  .lib-arrow{font-size:16px;color:var(--muted)}
  /* PHASE COLORS */
  .phase-1{background:#1e3a5f;color:#60a5fa}
  .phase-2{background:#1a3a2a;color:#34d399}
  .phase-3{background:#3a1a2a;color:#f472b6}
  .phase-4{background:#3a2a0a;color:#fbbf24}
  /* CATEGORY COLORS */
  .c-back{background:rgba(59,130,246,.15);color:var(--back);border-color:var(--back)}
  .c-chest{background:rgba(239,68,68,.15);color:var(--chest);border-color:var(--chest)}
  .c-core{background:rgba(16,185,129,.15);color:var(--core);border-color:var(--core)}
  .c-legs{background:rgba(168,85,247,.15);color:var(--legs);border-color:var(--legs)}
  .dot-back{background:var(--back)}
  .dot-chest{background:var(--chest)}
  .dot-core{background:var(--core)}
  .dot-legs{background:var(--legs)}
  .num-back{background:rgba(59,130,246,.2);color:var(--back)}
  .num-chest{background:rgba(239,68,68,.2);color:var(--chest)}
  .num-core{background:rgba(16,185,129,.2);color:var(--core)}
  .num-legs{background:rgba(168,85,247,.2);color:var(--legs)}
  /* NOTE BADGE */
  .note-badge{display:inline-block;background:rgba(249,115,22,.15);color:var(--accent);font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px;margin-top:4px;border:1px solid rgba(249,115,22,.3)}
  /* VIDEO LOADING */
  .vid-loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#000;font-size:24px}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-inner">
    <h1>💪 Workout Program</h1>
    <span id="phase-display" style="font-size:12px;font-weight:600;color:var(--muted)"></span>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchPane('program')">📅 Program</button>
    <button class="tab" onclick="switchPane('library')">📚 Exercise Library</button>
  </div>
</div>

<div class="main">

  <!-- ═══════════════ PROGRAM PANE ═══════════════ -->
  <div id="pane-program" class="pane active">

    <!-- Week selector -->
    <div class="week-bar">
      <div class="week-scroll" id="weekScroll"></div>
    </div>

    <!-- Day cards -->
    <div class="days-grid" id="daysGrid"></div>

  </div>

  <!-- ═══════════════ LIBRARY PANE ═══════════════ -->
  <div id="pane-library" class="pane">
    <div class="lib-search">
      <input class="search-input" type="search" placeholder="🔍  Search exercises…" oninput="filterLib(this.value)" id="searchInput">
    </div>
    <div class="cat-tabs">
      <button class="cat-tab active" data-cat="all" onclick="setCat('all',this)">All (66)</button>
      <button class="cat-tab" data-cat="back" onclick="setCat('back',this)">🔵 Back (12)</button>
      <button class="cat-tab" data-cat="chest" onclick="setCat('chest',this)">🔴 Chest (14)</button>
      <button class="cat-tab" data-cat="core" onclick="setCat('core',this)">🟢 Core (15)</button>
      <button class="cat-tab" data-cat="legs" onclick="setCat('legs',this)">🟣 Legs (25)</button>
    </div>
    <div class="lib-section" id="libContent"></div>
  </div>

</div>

<!-- ═══════════════ EXERCISE MODAL ═══════════════ -->
<div class="modal-overlay" id="modal">
  <div class="modal-close">
    <h2 id="modalTitle"></h2>
    <button class="close-btn" onclick="closeModal()">✕</button>
  </div>
  <div class="modal-video">
    <div class="vid-loading" id="vidLoading">⏳</div>
    <video id="modalVideo" playsinline webkit-playsinline muted loop controls
      style="display:none"
      oncanplay="document.getElementById('vidLoading').style.display='none';this.style.display='block';this.play()">
    </video>
  </div>
  <div class="modal-body">
    <div class="modal-tags" id="modalTags"></div>
    <p class="modal-section-title">Coaching Cues</p>
    <ul class="cue-list" id="modalCues"></ul>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
// EXERCISE DATABASE
// ═══════════════════════════════════════════
const EX = {

    {id:'legs_15',sets:3,reps:'14 reps'},{id:'legs_16',sets:3,reps:'8 reps'},{id:'legs_13',sets:3,reps:'8 reps'},{id:'legs_20',sets:3,reps:'10 reps'},{id:'legs_17',sets:4,reps:'12 reps each side'}]}
]},
12:{days:[
  {label:'Day 1',cat:'chest',title:'Chest',color:'chest',exs:[
    {id:'chest_10',sets:4,reps:'16 reps each side'},{id:'chest_12',sets:3,reps:'14 reps'},{id:'chest_13',sets:4,reps:'12 reps each side'},{id:'chest_09',sets:4,reps:'12 reps each side'},{id:'chest_08',sets:4,reps:'Until Failure each side'},{id:'chest_05',sets:4,reps:'Until Failure each side'}]},
  {label:'Day 2',cat:'back',title:'Back',color:'back',exs:[
    {id:'back_03',sets:4,reps:'Until Failure each side'},{id:'back_12',sets:3,reps:'12 reps each side'},{id:'back_11',sets:3,reps:'16 reps'},{id:'back_10',sets:3,reps:'16 reps'},{id:'back_09',sets:4,reps:'16 reps each side'},{id:'back_08',sets:4,reps:'12 reps each side'}]},

    {id:'core_14',sets:3,reps:'12 reps'},{id:'core_15',sets:3,reps:'30 sec'},{id:'core_12',sets:3,reps:'14 reps'},{id:'core_09',sets:3,reps:'20 sec'},{id:'core_11',sets:4,reps:'12 reps each side'},{id:'core_13',sets:3,reps:'12 reps'}]},

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
const allExs = [...EX.back,...EX.chest,...EX.core,...EX.legs];
function getEx(id){return allExs.find(e=>e.id===id)}
function getCat(id){return id.split('_')[0]}
function getPhase(w){return PHASES.find(p=>p.weeks.includes(w))}

let currentWeek=1, currentCat='all';

// ═══════════════════════════════════════════
// RENDER WEEK SELECTOR
// ═══════════════════════════════════════════
function renderWeekSelector(){
  const sc=document.getElementById('weekScroll');
  sc.innerHTML='';
  for(let w=1;w<=12;w++){
    const ph=getPhase(w);
    const btn=document.createElement('button');
    btn.className='wk'+(w===currentWeek?' active':'');
    btn.innerHTML=`W${w}`;
    btn.onclick=()=>selectWeek(w);
    sc.appendChild(btn);
  }
}
function selectWeek(w){
  currentWeek=w;
  document.querySelectorAll('.wk').forEach((b,i)=>b.classList.toggle('active',i+1===w));
  const ph=getPhase(w);
  document.getElementById('phase-display').textContent=ph?`${ph.emoji} ${ph.label}`:'';
  renderDays();
  // scroll selected week into view
  const btns=document.querySelectorAll('.wk');
  if(btns[w-1]) btns[w-1].scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
}

// ═══════════════════════════════════════════
// RENDER DAYS
// ═══════════════════════════════════════════
function renderDays(){
  const grid=document.getElementById('daysGrid');
  const weekData=PLAN[currentWeek];
  if(!weekData){grid.innerHTML='<p style="padding:20px;color:var(--muted)">No data for this week</p>';return;}
  const ph=getPhase(currentWeek);
  grid.innerHTML='';
  weekData.days.forEach((day,di)=>{
    const card=document.createElement('div');
    card.className='day-card'+(di===0?' open':'');
    card.innerHTML=`
      <div class="day-header" onclick="toggleDay(this.parentElement)">
        <div class="day-label">
          <div class="day-dot dot-${day.color}"></div>
          <div>
            <div class="day-title">${day.label} · ${day.title}</div>
            <div class="day-sub">${day.exs.length} exercises${di===3?'  •  Can skip on 3-day split':''}</div>
          </div>
        </div>
        <span class="day-chevron">⌄</span>
      </div>
      <div class="day-exercises">
        ${day.exs.map((e,i)=>{
          const ex=getEx(e.id);
          if(!ex)return'';
          return`<div class="ex-item" onclick="openModal('${ex.id}')">
            <div class="ex-num num-${day.color}">${i+1}</div>
            <div class="ex-info">
              <div class="ex-name">${ex.name}</div>
              <div class="ex-meta">${e.sets} sets · ${e.reps}</div>
            </div>
            <div class="ex-play">▶</div>
          </div>`;
        }).join('')}
      </div>`;
    grid.appendChild(card);
  });
  // update phase display
  if(ph) document.getElementById('phase-display').textContent=`${ph.emoji} ${ph.label}`;
}
function toggleDay(card){card.classList.toggle('open')}

// ═══════════════════════════════════════════
// MODAL
// ═══════════════════════════════════════════
function openModal(id){
  const ex=getEx(id);
  if(!ex)return;
  const cat=getCat(id);
  const vid=document.getElementById('modalVideo');
  const loading=document.getElementById('vidLoading');
  vid.style.display='none';
  loading.style.display='flex';
  vid.src='clips/'+ex.file;
  vid.load();
  document.getElementById('modalTitle').textContent=ex.name;
  document.getElementById('modalTags').innerHTML=`
    <span class="tag c-${cat}">${cat.toUpperCase()}</span>
    <span class="tag" style="border-color:var(--muted);color:var(--muted)">${ex.sets} sets</span>
    <span class="tag" style="border-color:var(--muted);color:var(--muted)">${ex.reps} ${ex.unit!=='failure'?ex.unit:''}</span>
    ${ex.note?`<span class="tag" style="border-color:var(--accent);color:var(--accent)">${ex.note}</span>`:''}
  `;
  document.getElementById('modalCues').innerHTML=ex.cues.map(c=>`<li>${c}</li>`).join('');
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(){
  const vid=document.getElementById('modalVideo');
  vid.pause();vid.src='';
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow='';
}
document.getElementById('modal').addEventListener('click',function(e){
  if(e.target===this)closeModal();
});

// ═══════════════════════════════════════════
// LIBRARY
// ═══════════════════════════════════════════
function renderLib(cat='all',q=''){
  const cont=document.getElementById('libContent');
  const cats=cat==='all'?['back','chest','core','legs']:[cat];
  let html='';
  cats.forEach(c=>{
    const list=EX[c].filter(e=>!q||e.name.toLowerCase().includes(q.toLowerCase()));
    if(!list.length)return;
    html+=`<div class="lib-cat-header"><div class="lib-cat-dot dot-${c}"></div>${c.charAt(0).toUpperCase()+c.slice(1)} (${list.length})</div>`;
    html+=`<div class="lib-grid">`;
    list.forEach(ex=>{
      html+=`<div class="lib-card" onclick="openModal('${ex.id}')">
        <div class="lib-thumb">
          <video src="clips/${ex.file}" muted playsinline webkit-playsinline preload="none" style="width:100%;height:100%;object-fit:cover"></video>
          <div class="lib-play-icon">▶</div>
        </div>
        <div class="lib-info">
          <div class="lib-name">${ex.name}</div>
          <div class="lib-meta">${ex.sets} sets · ${ex.reps} ${ex.unit!=='failure'?ex.unit:'to failure'}${ex.note?'  ·  '+ex.note:''}</div>
        </div>
        <div class="lib-arrow">›</div>
      </div>`;
    });
    html+=`</div>`;
    if(cats.indexOf(c)<cats.length-1) html+=`<div style="height:8px"></div>`;
  });
  if(!html) html=`<p style="padding:30px;text-align:center;color:var(--muted)">No exercises found for "${q}"</p>`;
  cont.innerHTML=html;
}
function setCat(cat,el){
  currentCat=cat;
  document.querySelectorAll('.cat-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderLib(cat,document.getElementById('searchInput').value);
}
function filterLib(q){renderLib(currentCat,q)}

// ═══════════════════════════════════════════
// PANE SWITCHING
// ═══════════════════════════════════════════
function switchPane(name){
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('pane-'+name).classList.add('active');
  event.currentTarget.classList.add('active');
  if(name==='library')renderLib(currentCat,'');
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
renderWeekSelector();
selectWeek(1);
renderLib('all','');

// Swipe to close modal on iOS
let touchStartY=0;
document.getElementById('modal').addEventListener('touchstart',e=>touchStartY=e.touches[0].clientY,{passive:true});
document.getElementById('modal').addEventListener('touchmove',e=>{
  if(e.touches[0].clientY-touchStartY>80)closeModal();
},{passive:true});
</script>
